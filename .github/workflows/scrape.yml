# ==============================================================================
# Workflow GitHub Actions pour le scraping automatique de Legit.ng
# ==============================================================================
name: RSS Scraper - Legit.ng vers Français

# ==============================================================================
# DÉCLENCHEURS (Triggers)
# ==============================================================================
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

# ==============================================================================
# VARIABLES D'ENVIRONNEMENT GLOBALES
# ==============================================================================
env:
  PYTHON_VERSION: '3.10'
  PIP_NO_INPUT: 1
  PIP_DEFAULT_TIMEOUT: 100

# ==============================================================================
# DÉFINITION DES JOBS
# ==============================================================================
jobs:
  scrape-and-translate:
    name: Scrape, traduit et publie le flux RSS
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write

    timeout-minutes: 30

    steps:
      # -----------------------------------------------------------------------
      # Étape 1: Checkout du dépôt (CORRECTION IMPORTANTE)
      # -----------------------------------------------------------------------
      - name: Récupération du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          # S'assurer que le checkout est fait dans le bon répertoire
          path: .

      # DEBUG: Vérifier qu'on est bien dans un dépôt git
      - name: Vérification du dépôt git
        run: |
          echo "Répertoire courant: $(pwd)"
          echo "Contenu du répertoire:"
          ls -la
          echo "Vérification de l'existence de .git:"
          if [ -d ".git" ]; then
            echo "✓ .git existe"
            git status
          else
            echo "✗ .git n'existe pas !"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Étape 2: Configuration de Python
      # -----------------------------------------------------------------------
      - name: Installation de Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # -----------------------------------------------------------------------
      # Étape 3: Installation des dépendances
      # -----------------------------------------------------------------------
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          echo "=== Versions installées ==="
          pip list | grep -E "cloudscraper|beautifulsoup4|lxml|feedgen|transformers|torch|sentencepiece|protobuf"

      # -----------------------------------------------------------------------
      # Étape 4: Exécution du scraper
      # -----------------------------------------------------------------------
      - name: Exécution du scraper et traduction
        run: |
          echo "=== Début du scraping ==="
          echo "Date: $(date)"
          python scraper_traducteur.py
          echo "=== Fin du scraping ==="
          
          if [ -f "feed.xml" ]; then
            echo "✓ feed.xml généré avec succès"
            echo "Taille: $(wc -c < feed.xml) octets"
          else
            echo "✗ Erreur: feed.xml non créé"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Étape 5: Publication sur GitHub Pages
      # -----------------------------------------------------------------------
      - name: Publication sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          commit_message: "Mise à jour automatique du flux RSS (${{ github.run_id }})"
          force_orphan: true
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      # -----------------------------------------------------------------------
      # Étape 6: Mise à jour sur la branche principale (CORRIGÉE)
      # -----------------------------------------------------------------------
      - name: Commit et push vers main
        run: |
          # S'assurer d'être dans le bon répertoire
          cd $GITHUB_WORKSPACE
          
          # Vérifier à nouveau qu'on est dans un dépôt git
          if [ ! -d ".git" ]; then
            echo "ERREUR: .git n'existe pas dans $GITHUB_WORKSPACE"
            echo "Contenu du répertoire:"
            ls -la
            exit 1
          fi
          
          # Configurer git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Vérifier la branche actuelle
          echo "Branche actuelle:"
          git branch
          
          # S'assurer qu'on est sur main
          git checkout main || git checkout -b main
          
          # Ajouter le fichier
          git add feed.xml
          
          # Vérifier les changements
          if git diff --staged --quiet; then
            echo "Aucun changement détecté dans feed.xml. Push ignoré."
          else
            git commit -m "Mise à jour du flux RSS - $(date '+%Y-%m-%d %H:%M')"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Étape 7: Résumé
      # -----------------------------------------------------------------------
      - name: Résumé de l'exécution
        if: always()
        run: |
          echo "### Résumé du scraping" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Statut:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Fichier généré:** feed.xml" >> $GITHUB_STEP_SUMMARY
          echo "- **URL du flux:** https://buzzplus225.github.io/legitoi.github.io/feed.xml" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "feed.xml" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Extrait du flux" >> $GITHUB_STEP_SUMMARY
            echo '```xml' >> $GITHUB_STEP_SUMMARY
            head -30 feed.xml >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
