# ==============================================================================
# Workflow GitHub Actions pour le scraping automatique de Legit.ng
# ==============================================================================
name: RSS Scraper - Legit.ng vers Français

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  PIP_NO_INPUT: 1
  PIP_DEFAULT_TIMEOUT: 100

jobs:
  scrape-and-translate:
    name: Scrape, traduit et publie le flux RSS
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write

    timeout-minutes: 30

    steps:
      # ============================================================
      # ÉTAPE 1: CHECKOUT OBLIGATOIRE
      # ============================================================
      - name: Récupération du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          # NE PAS spécifier 'path' - garder le répertoire par défaut

      # ============================================================
      # ÉTAPE 2: VÉRIFICATION GIT
      # ============================================================
      - name: Vérification du dépôt
        run: |
          echo "📁 Répertoire de travail: $(pwd)"
          echo ""
          echo "📋 Contenu du répertoire:"
          ls -la
          echo ""
          echo "🔍 Recherche de .git:"
          if [ -d ".git" ]; then
            echo "✅ .git trouvé"
            echo ""
            echo "📊 Statut git:"
            git status
            echo ""
            echo "🌿 Branches disponibles:"
            git branch -a
          else
            echo "❌ .git NON TROUVÉ"
            echo "Tentative d'initialisation..."
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git fetch origin
            git checkout main || git checkout -b main
          fi

      # ============================================================
      # ÉTAPE 3: PYTHON
      # ============================================================
      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # ============================================================
      # ÉTAPE 4: DÉPENDANCES
      # ============================================================
      - name: Installation des dépendances
        run: |
          echo "📦 Installation des dépendances..."
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          echo ""
          echo "✅ Dépendances installées:"
          pip list | grep -E "cloudscraper|beautifulsoup4|lxml|feedgen|transformers|torch|sentencepiece"

      # ============================================================
      # ÉTAPE 5: SCRAPING
      # ============================================================
      - name: Exécution du scraper
        run: |
          echo "🚀 Début du scraping: $(date)"
          python scraper_traducteur.py
          echo "✅ Fin du scraping: $(date)"
          
          if [ -f "feed.xml" ]; then
            echo "✅ feed.xml généré"
            echo "📊 Taille: $(wc -c < feed.xml) octets"
          else
            echo "❌ feed.xml non créé"
            exit 1
          fi

      # ============================================================
      # ÉTAPE 6: GITHUB PAGES
      # ============================================================
      - name: Publication sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          commit_message: "🔄 Mise à jour RSS - ${{ github.run_id }}"
          force_orphan: true
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      # ============================================================
      # ÉTAPE 7: COMMIT SUR MAIN (CORRIGÉ)
      # ============================================================
      - name: Commit et push vers main
        run: |
          echo "📁 Répertoire courant: $(pwd)"
          
          # Vérifier si .git existe, sinon l'initialiser
          if [ ! -d ".git" ]; then
            echo "⚠️ .git n'existe pas, initialisation..."
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git fetch origin
            git checkout main || git checkout -b main
          fi
          
          # Configurer git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Vérifier qu'on est sur main
          echo "🌿 Branche actuelle:"
          git branch
          echo ""
          
          # Si on est pas sur main, essayer de checkout
          CURRENT_BRANCH=$(git branch --show-current)
          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "⚠️ Pas sur main, tentative de checkout..."
            git checkout main || git checkout -b main
          fi
          
          # Ajouter le fichier
          git add feed.xml
          
          # Vérifier les changements
          if git diff --staged --quiet; then
            echo "✅ Aucun changement détecté dans feed.xml"
            echo "Le flux RSS est déjà à jour"
          else
            echo "📝 Changements détectés, commit en cours..."
            git commit -m "🔄 Mise à jour RSS - $(date '+%Y-%m-%d %H:%M')"
            git push origin main
            echo "✅ Push effectué avec succès"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================================
      # ÉTAPE 8: RÉSUMÉ
      # ============================================================
      - name: Résumé de l'exécution
        if: always()
        run: |
          echo "### 📊 Résumé du scraping" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrique | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Date | $(date) |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Statut | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 Fichier | feed.xml |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 URL | https://buzzplus225.github.io/legitoi.github.io/feed.xml |" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "feed.xml" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📝 Extrait du flux" >> $GITHUB_STEP_SUMMARY
            echo '```xml' >> $GITHUB_STEP_SUMMARY
            head -20 feed.xml >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
