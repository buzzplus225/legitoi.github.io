# ==============================================================================
# Workflow GitHub Actions pour le scraping automatique de Legit.ng
# ==============================================================================
name: RSS Scraper - Legit.ng vers Français

# ==============================================================================
# DÉCLENCHEURS (Triggers)
# ==============================================================================
on:
  # Exécution automatique toutes les 4 heures
  schedule:
    - cron: '0 */4 * * *'

  # Permet de déclencher manuellement depuis l'onglet Actions de GitHub
  workflow_dispatch:

# ==============================================================================
# VARIABLES D'ENVIRONNEMENT GLOBALES
# ==============================================================================
env:
  PYTHON_VERSION: '3.10'
  PIP_NO_INPUT: 1
  PIP_DEFAULT_TIMEOUT: 100

# ==============================================================================
# DÉFINITION DES JOBS
# ==============================================================================
jobs:
  scrape-and-translate:
    name: Scrape, traduit et publie le flux RSS
    runs-on: ubuntu-latest
    
    # Permissions nécessaires pour modifier le dépôt et publier
    permissions:
      contents: write
      pages: write
      id-token: write

    # Délai maximum d'exécution
    timeout-minutes: 30

    steps:
      # -----------------------------------------------------------------------
      # Étape 1: Checkout du dépôt
      # -----------------------------------------------------------------------
      - name: Récupération du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Étape 2: Configuration de Python avec cache optimisé
      # -----------------------------------------------------------------------
      - name: Installation de Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # -----------------------------------------------------------------------
      # Étape 3: Installation des dépendances Python
      # -----------------------------------------------------------------------
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          
          # Vérification des installations
          echo "=== Versions installées ==="
          pip list | grep -E "cloudscraper|beautifulsoup4|lxml|feedgen|transformers|torch|sentencepiece|protobuf"

      # -----------------------------------------------------------------------
      # Étape 4: Exécution du scraper
      # -----------------------------------------------------------------------
      - name: Exécution du scraper et traduction
        run: |
          echo "=== Début du scraping ==="
          echo "Date: $(date)"
          
          python scraper_traducteur.py
          
          echo "=== Fin du scraping ==="
          
          # Vérification que le fichier a été créé
          if [ -f "feed.xml" ]; then
            echo "✓ feed.xml généré avec succès"
            echo "Taille: $(wc -c < feed.xml) octets"
          else
            echo "✗ Erreur: feed.xml non créé"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Étape 5: Publication sur GitHub Pages
      # -----------------------------------------------------------------------
      - name: Publication sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          commit_message: "Mise à jour automatique du flux RSS (${{ github.run_id }})"
          force_orphan: true
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      # -----------------------------------------------------------------------
      # Étape 6: Mise à jour sur la branche principale
      # -----------------------------------------------------------------------
      - name: Commit et push vers main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Ajouter feed.xml
          git add feed.xml
          
          # Vérifier s'il y a des changements
          if git diff --cached --quiet; then
            echo "Aucun changement détecté dans feed.xml. Push ignoré."
          else
            git commit -m "Mise à jour du flux RSS - $(date '+%Y-%m-%d %H:%M')"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Étape 7: Résumé dans l'interface GitHub
      # -----------------------------------------------------------------------
      - name: Résumé de l'exécution
        if: always()
        run: |
          echo "### Résumé du scraping" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Statut:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Fichier généré:** feed.xml" >> $GITHUB_STEP_SUMMARY
          echo "- **URL du flux:** https://buzzplus225.github.io/legitoi.github.io/feed.xml" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "feed.xml" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Extrait du flux" >> $GITHUB_STEP_SUMMARY
            echo '```xml' >> $GITHUB_STEP_SUMMARY
            head -30 feed.xml >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
