# ==============================================================================
# Workflow GitHub Actions pour le scraping automatique de Legit.ng
# ==============================================================================
name: RSS Scraper - Legit.ng vers Français

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  PIP_NO_INPUT: 1
  PIP_DEFAULT_TIMEOUT: 100

jobs:
  scrape-and-translate:
    name: Scrape, traduit et publie le flux RSS
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write

    timeout-minutes: 30

    steps:
      # ============================================================
      # ÉTAPE 1: CHECKOUT (Récupère proprement la branche main)
      # ============================================================
      - name: Récupération du code source
        uses: actions/checkout@v4
        with:
          ref: main # S'assure d'être explicitement sur main

      # ============================================================
      # ÉTAPE 2: CONFIGURATION GIT
      # ============================================================
      - name: Configuration Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "🌿 Branche actuelle: $(git branch --show-current)"

      # ============================================================
      # ÉTAPE 3: PYTHON
      # ============================================================
      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # ============================================================
      # ÉTAPE 4: DÉPENDANCES
      # ============================================================
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          echo "✅ Dépendances installées"

      # ============================================================
      # ÉTAPE 5: SCRAPING
      # ============================================================
      - name: Exécution du scraper
        run: |
          echo "🚀 Début du scraping: $(date)"
          python scraper_traducteur.py
          echo "✅ Fin du scraping: $(date)"
          
          if [ -f "feed.xml" ]; then
            echo "✅ feed.xml généré"
            echo "📊 Taille: $(wc -c < feed.xml) octets"
          else
            echo "❌ feed.xml non créé"
            exit 1
          fi

      # ============================================================
      # ÉTAPE 6: GITHUB PAGES (Publie feed.xml sur la branche gh-pages)
      # ============================================================
      - name: Publication sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          commit_message: "🔄 Mise à jour RSS - ${GITHUB_RUN_ID}"
          force_orphan: true
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      # ============================================================
      # ÉTAPE 7: COMMIT SUR MAIN (Sécurisé contre les conflits de concurrence)
      # ============================================================
      - name: Commit et push vers main
        run: |
          git add feed.xml
          
          if git diff --staged --quiet; then
            echo "✅ Aucun changement détecté dans feed.xml"
          else
            echo "📝 Changements détectés, sauvegarde en cours..."
            git commit -m "🔄 Mise à jour RSS - $(date '+%Y-%m-%d %H:%M')"
            
            # Utilisation d'une boucle pour gérer d'éventuels commits concurrents sur le dépôt
            for i in {1..3}; do
              git pull origin main --rebase
              if git push origin main; then
                echo "✅ Push effectué avec succès"
                break
              fi
              echo "⚠️ Échec du push, nouvelle tentative après attente..."
              sleep 5
            done
          fi

      # ============================================================
      # ÉTAPE 8: RÉSUMÉ
      # ============================================================
      - name: Résumé de l'exécution
        if: always()
        run: |
          echo "### 📊 Résumé du scraping" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrique | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Date | $(date) |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Statut | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 Fichier | feed.xml |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 URL | https://buzzplus225.github.io/legitoi.github.io/feed.xml |" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "feed.xml" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📝 Extrait du flux" >> $GITHUB_STEP_SUMMARY
            echo '```xml' >> $GITHUB_STEP_SUMMARY
            head -20 feed.xml >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
