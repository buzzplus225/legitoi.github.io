# ==============================================================================
# Workflow GitHub Actions pour le scraping automatique de Legit.ng
# ==============================================================================
name: RSS Scraper - Legit.ng vers Français

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  PIP_NO_INPUT: 1
  PIP_DEFAULT_TIMEOUT: 100

jobs:
  scrape-and-translate:
    name: Scrape, traduit et publie le flux RSS
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write

    timeout-minutes: 30

    steps:
      # ============================================================
      # ÉTAPE 1: CHECKOUT
      # ============================================================
      - name: Récupération du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ============================================================
      # ÉTAPE 2: VÉRIFICATION ET CORRECTION GIT
      # ============================================================
      - name: Configuration Git
        run: |
          echo "📁 Répertoire: $(pwd)"
          echo "📋 Contenu:"
          ls -la
          
          # Si .git n'existe pas, l'initialiser correctement
          if [ ! -d ".git" ]; then
            echo "⚠️ Initialisation de git..."
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            
            # Récupérer les branches existantes
            git fetch origin
            
            # Si la branche main existe sur le remote
            if git ls-remote --heads origin main | grep -q main; then
              echo "✅ Branche main trouvée sur le remote"
              git fetch origin main
              git checkout main || git checkout -b main origin/main
            else
              echo "⚠️ Création de la branche main"
              git checkout -b main
            fi
          else
            echo "✅ .git existe"
            git fetch origin
            git checkout main || git checkout -b main
          fi
          
          # Configurer git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "🌿 Branche actuelle: $(git branch --show-current)"
          git status

      # ============================================================
      # ÉTAPE 3: PYTHON
      # ============================================================
      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # ============================================================
      # ÉTAPE 4: DÉPENDANCES
      # ============================================================
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          echo "✅ Dépendances installées"

      # ============================================================
      # ÉTAPE 5: SCRAPING
      # ============================================================
      - name: Exécution du scraper
        run: |
          echo "🚀 Début du scraping: $(date)"
          python scraper_traducteur.py
          echo "✅ Fin du scraping: $(date)"
          
          if [ -f "feed.xml" ]; then
            echo "✅ feed.xml généré"
            echo "📊 Taille: $(wc -c < feed.xml) octets"
          else
            echo "❌ feed.xml non créé"
            exit 1
          fi

      # ============================================================
      # ÉTAPE 6: GITHUB PAGES
      # ============================================================
      - name: Publication sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          commit_message: "🔄 Mise à jour RSS - ${{ github.run_id }}"
          force_orphan: true
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      # ============================================================
      # ÉTAPE 7: COMMIT SUR MAIN (CORRIGÉ)
      # ============================================================
      - name: Commit et push vers main
        run: |
          # S'assurer qu'on est dans le bon répertoire
          cd $GITHUB_WORKSPACE
          
          # Configurer git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Récupérer les dernières modifications du remote
          echo "🔄 Pull des dernières modifications..."
          git pull origin main --rebase || true
          
          # Ajouter le fichier
          git add feed.xml
          
          # Vérifier les changements
          if git diff --staged --quiet; then
            echo "✅ Aucun changement détecté dans feed.xml"
            echo "Le flux RSS est déjà à jour"
          else
            echo "📝 Changements détectés, commit en cours..."
            git commit -m "🔄 Mise à jour RSS - $(date '+%Y-%m-%d %H:%M')"
            
            # Push avec force seulement si nécessaire
            echo "📤 Push vers main..."
            if git push origin main; then
              echo "✅ Push effectué avec succès"
            else
              echo "⚠️ Push rejeté, tentative de force..."
              git pull origin main --rebase
              git push origin main || git push origin main --force-with-lease
              echo "✅ Push forcé effectué"
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================================
      # ÉTAPE 8: RÉSUMÉ
      # ============================================================
      - name: Résumé de l'exécution
        if: always()
        run: |
          echo "### 📊 Résumé du scraping" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrique | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Date | $(date) |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Statut | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 Fichier | feed.xml |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 URL | https://buzzplus225.github.io/legitoi.github.io/feed.xml |" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "feed.xml" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📝 Extrait du flux" >> $GITHUB_STEP_SUMMARY
            echo '```xml' >> $GITHUB_STEP_SUMMARY
            head -20 feed.xml >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
