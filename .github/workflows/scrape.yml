# ==============================================================================
# Workflow GitHub Actions pour le scraping automatique de Legit.ng
# ==============================================================================
name: RSS Scraper - Legit.ng vers Français

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  PIP_NO_INPUT: 1
  PIP_DEFAULT_TIMEOUT: 100

jobs:
  scrape-and-translate:
    name: Scrape, traduit et publie le flux RSS
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write

    timeout-minutes: 30

    steps:
      # Étape 1: Checkout
      - name: Récupération du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Étape 2: Debug git
      - name: Vérification du dépôt
        run: |
          echo "📁 Répertoire courant: $(pwd)"
          echo "📋 Contenu:"
          ls -la
          echo "🔍 Vérification de .git:"
          if [ -d ".git" ]; then
            echo "✅ .git existe"
            git status
            git branch -a
          else
            echo "❌ .git n'existe pas !"
            exit 1
          fi

      # Étape 3: Python
      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # Étape 4: Dépendances
      - name: Installation des dépendances
        run: |
          echo "📦 Installation des dépendances..."
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          echo ""
          echo "✅ Versions installées:"
          pip list | grep -E "cloudscraper|beautifulsoup4|lxml|feedgen|transformers|torch|sentencepiece|protobuf|dateutil"

      # Étape 5: Scraping
      - name: Exécution du scraper
        run: |
          echo "🚀 Début du scraping: $(date)"
          python scraper_traducteur.py
          echo "✅ Fin du scraping: $(date)"
          
          if [ -f "feed.xml" ]; then
            echo "✅ feed.xml généré"
            echo "📊 Taille: $(wc -c < feed.xml) octets"
            echo "📝 Nombre de lignes: $(wc -l < feed.xml)"
          else
            echo "❌ feed.xml non créé"
            exit 1
          fi

      # Étape 6: GitHub Pages
      - name: Publication sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          commit_message: "🔄 Mise à jour RSS - ${{ github.run_id }}"
          force_orphan: true
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      # Étape 7: Commit sur main
      - name: Commit et push vers main
        run: |
          cd $GITHUB_WORKSPACE
          
          # Vérifier .git
          if [ ! -d ".git" ]; then
            echo "❌ .git n'existe pas"
            exit 1
          fi
          
          # Configurer git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # S'assurer d'être sur main
          git checkout main || git checkout -b main
          
          # Ajouter le fichier
          git add feed.xml
          
          # Vérifier les changements
          if git diff --staged --quiet; then
            echo "✅ Aucun changement détecté"
            echo "Le flux RSS est déjà à jour"
          else
            echo "📝 Changements détectés"
            git commit -m "🔄 Mise à jour RSS - $(date '+%Y-%m-%d %H:%M')"
            git push origin main
            echo "✅ Push effectué"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Étape 8: Résumé
      - name: Résumé de l'exécution
        if: always()
        run: |
          echo "### 📊 Résumé du scraping" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrique | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Date | $(date) |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Statut | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 Fichier | feed.xml |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 URL | https://buzzplus225.github.io/legitoi.github.io/feed.xml |" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "feed.xml" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📝 Extrait du flux" >> $GITHUB_STEP_SUMMARY
            echo '```xml' >> $GITHUB_STEP_SUMMARY
            head -30 feed.xml >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
